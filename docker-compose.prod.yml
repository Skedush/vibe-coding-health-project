version: '3.8'
services:
  db:
    image: mysql:5.7
    env_file:
      - .env.production
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - health_network_prod
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.production
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - health_network_prod
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - health_network_prod
    restart: unless-stopped

volumes:
  mysql_data_prod:

networks:
  health_network_prod:
    driver: bridge
