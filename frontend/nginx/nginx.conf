server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 不缓存
    location = /index.html {
        expires -1;
    }

    # React Router SPA 支持
    location / {
        try_files $uri $uri/ /index.html;
    }
}
