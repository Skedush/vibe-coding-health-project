name: Deploy to Server

on:
  push:
    branches:
      - main

env:
  DEPLOY_ENV: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_ENV
          script: |
            cd ${{ secrets.SSH_DEPLOY_PATH }}
            git pull origin main

            if [ "$DEPLOY_ENV" = "prod" ]; then
              docker-compose -f docker-compose.prod.yml up -d --build --remove-orphans
            else
              docker-compose up -d --build
            fi

  deploy-db:
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - name: Initialize database
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SSH_DEPLOY_PATH }}

            # 检查数据库是否已有数据
            DB_EXISTS=$(docker-compose -f docker-compose.prod.yml exec -T db mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} health -sse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'health'" 2>/dev/null || echo "0")

            if [ "$DB_EXISTS" = "0" ] || [ -z "$DB_EXISTS" ]; then
              echo "Initializing database..."
              docker-compose -f docker-compose.prod.yml exec -T db mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} health < h_category.sql
              docker-compose -f docker-compose.prod.yml exec -T db mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} health < h_entry.sql
              docker-compose -f docker-compose.prod.yml exec -T db mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} health < h_entry_ship.sql
              echo "Database initialized"
            else
              echo "Database already initialized, skipping"
            fi
